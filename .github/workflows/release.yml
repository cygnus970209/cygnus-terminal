name: Release

on:
  # 수동 실행: Actions 탭에서 "Run workflow" 클릭
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0). Draft release 생성'
        required: true
        type: string
  # `v*` 태그를 push 하면 자동 실행
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform }} (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundle-args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundle-args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      # DEBUG: Secret 이 실제 저장된 길이 확인 — 값 자체는 마스킹되지만 길이는 찍힘.
      # 로컬 `printf '%s' '비번' | wc -c` 와 비교해 1~2 바이트 차이면 trailing newline / 공백.
      # 원인 확인되면 이 step 지워도 됨.
      - name: Debug secret lengths
        shell: bash
        run: |
          echo "key bytes: ${#TAURI_KEY}"
          echo "pwd bytes: ${#TAURI_PWD}"
        env:
          TAURI_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_PWD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater artifact 서명용 — Settings → Secrets 에 TAURI_SIGNING_PRIVATE_KEY /
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD 두 개 등록 필요.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # (선택) OS 레벨 code signing 시크릿은 나중에:
          # APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
          # APPLE_ID, APPLE_TEAM_ID, APPLE_PASSWORD, WINDOWS_CERTIFICATE, ...
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: 'Cygnus Terminal ${{ inputs.tag || github.ref_name }}'
          releaseBody: |
            See the assets below to download the installer for your platform.

            - macOS (Apple Silicon): `.dmg` or `.app.tar.gz`
            - Windows (x64): `.msi` or `.exe`

            이미 설치된 버전이 있다면 앱 내 업데이터가 자동으로 업그레이드합니다.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: false
          args: ${{ matrix.bundle-args }}
